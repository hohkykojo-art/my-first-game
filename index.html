<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Age of War - DuyBeo Edition</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            user-select: none; 
        }
        h2 { margin-bottom: 2px; font-size: 20px; color: #f1c40f; }
        #goldDisplay {
            font-size: 18px;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 8px;
        }
        canvas {
            background: #2e3d52;
            display: block;
            margin: 0 auto;
            border: 3px solid #4a6572;
            border-radius: 8px;
            max-width: 100%;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            background-color: #f9aa33;
            color: #232f34;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px #d78510;
        }
        button:active {
            box-shadow: 0 1px #d78510;
            transform: translateY(3px);
        }
        /* Đổi màu riêng cho nút DuyBeo nhìn cho VIP */
        .vip-btn {
            background-color: #9b59b6;
            color: white;
            box-shadow: 0 4px #6c3483;
        }
        .vip-btn:active { box-shadow: 0 1px #6c3483; }
    </style>
</head>
<body>

    <h2>KỶ NGUYÊN CHIẾN TRANH</h2>
    <div id="goldDisplay">Tài sản: 50$</div>
    
    <canvas id="gameCanvas" width="400" height="200"></canvas>
    
    <div class="controls">
        <button onclick="spawnUnit('warrior')">Chiến Binh (10$)</button>
        <button onclick="spawnUnit('archer')">Cung Thủ (15$)</button>
        <button class="vip-btn" onclick="spawnUnit('duybeo')">Khổng Lồ duybeo (50$)</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Hệ thống biến số của Game
        let gold = 50;
        let playerBaseHp = 500;
        let enemyBaseHp = 500;
        const maxBaseHp = 500;
        
        let myArmy = [];
        let enemyArmy = [];
        let spawnTimer = 0;
        let gameOver = false;
        let gameResultText = "";

        // Hàm mua lính (Đã có kiểm tra tiền vàng)
        function spawnUnit(type) {
            if (gameOver) return;

            if (type === 'warrior' && gold >= 10) {
                gold -= 10;
                myArmy.push({ x: 30, hp: 100, maxHp: 100, speed: 1, damage: 0.6, color: "#3498db", size: 15, height: 40 });
            } else if (type === 'archer' && gold >= 15) {
                gold -= 15;
                myArmy.push({ x: 30, hp: 60, maxHp: 60, speed: 0.8, damage: 0.4, color: "#2ecc71", size: 12, height: 35 });
            } else if (type === 'duybeo' && gold >= 50) {
                gold -= 50;
                // Nhân vật duybeo: Siêu to, siêu máu, sát thương lớn, đi chậm
                myArmy.push({ x: 30, hp: 300, maxHp: 300, speed: 0.5, damage: 1.5, color: "#e67e22", size: 28, height: 65 });
            }
            updateGoldDisplay();
        }

        // Kẻ địch xuất hiện tự động
        function spawnEnemy() {
            // Ngẫu nhiên sinh ra lính thường hoặc lính to của địch
            if(Math.random() > 0.3) {
                enemyArmy.push({ x: 370, hp: 90, maxHp: 90, speed: -1, damage: 0.5, color: "#e74c3c", size: 15, height: 40 });
            } else {
                enemyArmy.push({ x: 370, hp: 200, maxHp: 200, speed: -0.6, damage: 1.2, color: "#c0392b", size: 24, height: 55 });
            }
        }

        function updateGoldDisplay() {
            document.getElementById("goldDisplay").innerText = "Tài sản: " + Math.floor(gold) + "$";
        }

        function gameLoop() {
            if (gameOver) {
                // Vẽ màn hình kết thúc game
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = gameResultText === "CHIẾN THẮNG" ? "#2ecc71" : "#e74c3c";
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.fillText(gameResultText, canvas.width / 2, canvas.height / 2);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "14px Arial";
                ctx.fillText("Tải lại trang để chơi lại", canvas.width / 2, canvas.height / 2 + 30);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Vẽ mặt đất bãi mìn
            ctx.fillStyle = "#1e272e";
            ctx.fillRect(0, 160, canvas.width, 40);

            // 2. Vẽ Thành lũy 2 bên
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(0, 60, 30, 100); // Thành ta
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(370, 60, 30, 100); // Thành địch

            // 3. Vẽ THANH MÁU THÀNH LŨY
            // Thành ta
            ctx.fillStyle = "red"; ctx.fillRect(5, 45, 60, 6);
            ctx.fillStyle = "green"; ctx.fillRect(5, 45, (playerBaseHp / maxBaseHp) * 60, 6);
            // Thành địch
            ctx.fillStyle = "red"; ctx.fillRect(335, 45, 60, 6);
            ctx.fillStyle = "green"; ctx.fillRect(335, 45, (enemyBaseHp / maxBaseHp) * 60, 6);

            // Tăng tiền theo thời gian (+5$ mỗi giây / 60 khung hình)
            spawnTimer++;
            if (spawnTimer % 60 === 0) {
                gold += 5;
                updateGoldDisplay();
            }
            
            // Tự động sinh lính địch sau mỗi 2.5 giây
            if (spawnTimer % 150 === 0) spawnEnemy();

            // 4. Cập nhật & Vẽ quân ta
            myArmy.forEach((unit) => {
                let hasEnemyAhead = enemyArmy.some(enemy => Math.abs(enemy.x - unit.x) < 20);
                let hitEnemyBase = (unit.x >= 350); // Chạm thành địch

                if (!hasEnemyAhead && !hitEnemyBase) {
                    unit.x += unit.speed; 
                } else if (hasEnemyAhead) {
                    // Đánh lính địch
                    enemyArmy.forEach(enemy => {
                        if (Math.abs(enemy.x - unit.x) < 20) enemy.hp -= unit.damage;
                    });
                } else if (hitEnemyBase) {
                    // Đánh thành địch
                    enemyBaseHp -= unit.damage;
                    if (enemyBaseHp <= 0) { gameOver = true; gameResultText = "CHIẾN THẮNG"; }
                }
                
                // Thanh máu lính ta
                ctx.fillStyle = "red"; ctx.fillRect(unit.x - 2, 150 - unit.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(unit.x - 2, 150 - unit.height, (unit.hp / unit.maxHp) * 20, 3);
                // Thân lính ta
                ctx.fillStyle = unit.color;
                ctx.fillRect(unit.x, 160 - unit.height, unit.size, unit.height);
            });

            // 5. Cập nhật & Vẽ quân địch
            enemyArmy.forEach((enemy) => {
                let hasPlayerAhead = myArmy.some(unit => Math.abs(enemy.x - unit.x) < 20);
                let hitPlayerBase = (enemy.x <= 40); // Chạm thành ta

                if (!hasPlayerAhead && !hitPlayerBase) {
                    enemy.x += enemy.speed;
                } else if (hasPlayerAhead) {
                    // Đánh lính ta
                    myArmy.forEach(unit => {
                        if (Math.abs(enemy.x - unit.x) < 20) unit.hp -= enemy.damage;
                    });
                } else if (hitPlayerBase) {
                    // Đánh thành ta
                    playerBaseHp -= enemy.damage;
                    if (playerBaseHp <= 0) { gameOver = true; gameResultText = "THẤT BẠI"; }
                }

                // Thanh máu lính địch
                ctx.fillStyle = "red"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, (enemy.hp / enemy.maxHp) * 20, 3);
                // Thân lính địch
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, 160 - enemy.height, enemy.size, enemy.height);
            });

            // Tiền thưởng khi diệt địch: Lọc xem lính nào chết thì cộng tiền
            let deadEnemies = enemyArmy.filter(e => e.hp <= 0);
            if (deadEnemies.length > 0) {
                gold += deadEnemies.length * 20; // Cộng 20$ mỗi mạng diệt được
                updateGoldDisplay();
            }

            // Xóa lính hết máu khỏi mảng
            myArmy = myArmy.filter(u => u.hp > 0);
            enemyArmy = enemyArmy.filter(e => e.hp > 0);

            requestAnimationFrame(gameLoop);
        }

        // Khởi chạy game lần đầu
        updateGoldDisplay();
        gameLoop();
    </script>
</body>
</html>
